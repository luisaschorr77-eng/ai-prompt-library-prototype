<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Database Solution Sample - By Luisa Schorr</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6f8;--white:#fff;--surface-hover:#f9fafb;--border:#e5e7ec;--border-light:#eef0f4;--text:#1a1f36;--text-secondary:#4a5068;--text-muted:#8891a5;--text-light:#b0b7c8;--primary:#2563eb;--primary-light:#eff4ff;--primary-soft:#dbeafe;--green:#16a34a;--green-light:#ecfdf5;--purple:#7c3aed;--purple-light:#f5f3ff;--teal:#0d9488;--teal-light:#f0fdfa;--orange:#ea580c;--orange-light:#fff7ed;--rose:#e11d48;--rose-light:#fff1f2;--amber:#d97706;--amber-light:#fffbeb;--indigo:#4f46e5;--indigo-light:#eef2ff;--cyan:#0891b2;--cyan-light:#ecfeff;--emerald:#059669;--emerald-light:#ecfdf5;--pink:#db2777;--pink-light:#fdf2f8;--slate:#475569;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);--shadow-lg:0 8px 24px rgba(0,0,0,.08);--radius:10px;--radius-lg:14px;--radius-xl:18px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:270px 1fr 380px;grid-template-rows:64px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:10}
.topbar-left{display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;color:var(--primary)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.topbar-right{display:flex;align-items:center;gap:10px}
.prompt-count{font-size:12px;font-weight:600;color:var(--text-muted);background:var(--bg);padding:5px 12px;border-radius:20px}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 1px 2px rgba(37,99,235,.2)}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-1px)}
.btn-secondary{background:var(--white);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface-hover)}
.btn-ghost{background:transparent;color:var(--text-muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{font-size:12px;padding:5px 12px}

.sidebar{background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0}
.sidebar::-webkit-scrollbar{width:0}
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-light);padding:0 16px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;transition:all .12s;position:relative;font-size:13px}
.nav-item:hover{background:var(--surface-hover)}
.nav-item.active{background:var(--primary-light);color:var(--primary)}
.nav-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--primary);border-radius:0 3px 3px 0}
.nav-label{font-weight:500;color:inherit;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:not(.active) .nav-label{color:var(--text-secondary)}
.nav-count{font-size:10px;font-weight:600;color:var(--text-muted);background:var(--bg);padding:1px 6px;border-radius:8px;min-width:20px;text-align:center}
.nav-emoji{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.campaign-selector{margin:0 12px 16px;background:var(--bg);border-radius:var(--radius);padding:4px}
.campaign-chip{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-muted);transition:all .12s;margin-bottom:2px}
.campaign-chip:last-child{margin-bottom:0}
.campaign-chip:hover{color:var(--text-secondary)}
.campaign-chip.active{background:var(--white);color:var(--primary);font-weight:600;box-shadow:var(--shadow-sm)}
.campaign-chip .cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.main{overflow-y:auto;padding:24px;background:var(--bg)}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:#d1d5e0;border-radius:5px}
.view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.view-tabs{display:flex;gap:4px;background:var(--white);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
.view-tab{font-family:inherit;font-size:13px;font-weight:500;padding:7px 16px;border-radius:7px;cursor:pointer;color:var(--text-muted);transition:all .15s;border:none;background:transparent}
.view-tab:hover{color:var(--text-secondary)}
.view-tab.active{background:var(--primary);color:#fff;box-shadow:0 1px 3px rgba(37,99,235,.2)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border-light);border-radius:8px;padding:6px 12px;min-width:220px}
.search-bar input{border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);background:transparent;width:100%}
.search-bar input::placeholder{color:var(--text-light)}
.search-icon{color:var(--text-light);font-size:13px;flex-shrink:0}

.phase-filter-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.phase-chip{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border-light);background:var(--white);color:var(--text-muted);transition:all .15s}
.phase-chip:hover{border-color:#d1d5e0;color:var(--text-secondary)}
.phase-chip.active{background:var(--primary-light);color:var(--primary);border-color:var(--primary-soft)}

.type-group{margin-bottom:24px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.type-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.type-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.type-title{font-size:13px;font-weight:700;color:var(--text)}
.type-count{font-size:11px;font-weight:600;color:var(--text-muted);background:var(--bg);padding:1px 7px;border-radius:8px}
.type-line{flex:1;height:1px;background:var(--border-light)}
.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.node-card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.node-card:hover{border-color:#d1d5e0;box-shadow:var(--shadow-md);transform:translateY(-2px)}
.node-card.selected{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft),var(--shadow-md)}
.node-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.node-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.node-meta{display:flex;gap:5px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.node-phase-badge{font-size:9px;font-weight:500;padding:1px 6px;border-radius:4px;background:var(--bg);color:var(--text-muted)}
.node-campaign-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.node-campaign-label{font-size:9px;font-weight:500;color:var(--text-light)}
.node-desc{font-size:11px;color:var(--text-muted);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.node-deps{display:flex;gap:3px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border-light)}
.dep-pill{font-size:9px;font-weight:500;padding:1px 6px;background:var(--bg);border-radius:4px;color:var(--text-muted)}
.node-gate{position:absolute;top:10px;right:10px;font-size:12px;opacity:.3}

.db-table-wrapper{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border-light);overflow:hidden;box-shadow:var(--shadow-sm)}
.db-table{width:100%;border-collapse:collapse}
.db-table thead{background:var(--bg)}
.db-table th{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
.db-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle;font-size:12px}
.db-table tbody tr{cursor:pointer;transition:background .12s}
.db-table tbody tr:hover{background:var(--surface-hover)}
.db-table tbody tr.selected{background:var(--primary-light)}
.db-table tbody tr:last-child td{border-bottom:none}
.id-cell{font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:var(--primary);font-weight:500}
.cat-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;display:inline-block}

.panel{background:var(--white);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:#d1d5e0;border-radius:4px}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border-light);position:sticky;top:0;background:var(--white);z-index:2;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--text-light)}
.panel-body{padding:20px;flex:1}
.panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;flex:1}
.panel-empty-icon{font-size:32px;margin-bottom:12px;opacity:.3}
.panel-empty-text{font-size:13px;color:var(--text-light);max-width:200px;line-height:1.5}
.detail-block{margin-bottom:18px}
.detail-heading{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px}
.detail-text{font-size:13px;color:var(--text-secondary);line-height:1.6}
.detail-mono{font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:11px;background:var(--bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:12px;white-space:pre-wrap;color:var(--text-secondary);line-height:1.6;max-height:280px;overflow-y:auto}
.detail-mono::-webkit-scrollbar{width:3px}
.detail-mono::-webkit-scrollbar-thumb{background:#d1d5e0;border-radius:3px}
.tag-group{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:500;padding:3px 8px;background:var(--bg);border-radius:5px;color:var(--text-muted)}
.tag-accent{background:var(--primary-light);color:var(--primary)}
.node-name-display{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.3}
.copy-btn{font-family:inherit;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--text-muted);cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--surface-hover);color:var(--text)}
.copy-btn.copied{background:var(--green-light);color:var(--green);border-color:var(--green-light)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center}
.empty-icon{width:48px;height:48px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.empty-text{font-size:13px;color:var(--text-muted);max-width:240px;line-height:1.5}

.modal-overlay{position:fixed;inset:0;background:rgba(26,31,54,.35);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:var(--radius-xl);width:520px;max-height:85vh;overflow-y:auto;padding:32px;box-shadow:var(--shadow-lg);animation:modalIn .3s}
@keyframes modalIn{from{transform:translateY(16px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal h2{font-size:20px;font-weight:700;margin-bottom:4px}
.modal .modal-subtitle{color:var(--text-muted);font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.form-textarea{resize:vertical;min-height:60px}
.form-select{appearance:none;cursor:pointer}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left"><div class="logo"><div class="logo-icon">P</div><div><div style="line-height:1.2">Prompt Database Solution Sample</div><div style="font-size:10px;font-weight:500;color:var(--text-muted);letter-spacing:.2px">By Luisa Schorr</div></div></div></div>
    <div class="topbar-right">
      <div class="prompt-count" id="prompt-count">40 prompts</div>
      <button class="btn btn-secondary btn-sm" onclick="openModal()">+ Add Prompt</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-section"><div class="sidebar-label">Campaigns</div><div class="campaign-selector" id="campaign-selector"></div></div>
    <div class="sidebar-section"><div class="sidebar-label">Content Type</div><div id="sidebar-types"></div></div>
  </div>
  <div class="main">
    <div class="view-header">
      <div class="view-tabs">
        <button class="view-tab active" onclick="switchView('cards',this)">Cards</button>
        <button class="view-tab" onclick="switchView('table',this)">Table</button>
      </div>
      <div class="search-bar"><span class="search-icon">&#128269;</span><input type="text" placeholder="Search prompts..." id="search-input" oninput="onSearch(this.value)"></div>
    </div>
    <div id="phase-bar"></div>
    <div id="v-cards"></div><div id="v-table" style="display:none"></div>
  </div>
  <div class="panel" id="panel">
    <div class="panel-header"><div class="panel-title" id="ptitle">Prompt Details</div><button class="copy-btn" id="copy-btn" onclick="copyPrompt()" style="display:none">Copy Prompt</button></div>
    <div id="panel-content">
      <div class="panel-empty"><div class="panel-empty-icon">&#128203;</div><div class="panel-empty-text">Select a prompt from the database to view its details and template.</div></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal"><div class="modal">
  <h2>Add New Prompt</h2><p class="modal-subtitle">Add a content prompt to the database for your team to use.</p>
  <div class="form-group"><label class="form-label">Prompt Title</label><input class="form-input" placeholder="e.g., CSRD Blog: Scope 3 Guide" /></div>
  <div class="form-group"><label class="form-label">Campaign</label><select class="form-select"><option>CSRD Platform Launch</option><option>AI-Powered GRC Launch</option><option>Financial Reporting Rebrand</option></select></div>
  <div class="form-group"><label class="form-label">Content Type</label><select class="form-select"><option>Blog Content</option><option>Whitepaper</option><option>Email</option><option>Social Media</option><option>Paid Ads</option><option>Landing Page</option><option>Video</option><option>Podcast</option><option>Webinar</option><option>Case Study</option><option>Sales Enablement</option></select></div>
  <div class="form-group"><label class="form-label">Phase</label><select class="form-select"><option>Strategy</option><option>Content</option><option>Distribution</option><option>Measurement</option></select></div>
  <div class="form-group"><label class="form-label">Prompt Template</label><textarea class="form-textarea" rows="5" placeholder="Write the prompt template..."></textarea></div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="closeModal()">Add Prompt</button></div>
</div></div>
<script>
const CT={"blog":{l:"Blog Content",e:"\u270D\uFE0F",c:"var(--purple)",b:"var(--purple-light)"},"whitepaper":{l:"Whitepapers & Reports",e:"\uD83D\uDCD1",c:"var(--primary)",b:"var(--primary-light)"},"email":{l:"Email Content",e:"\u2709\uFE0F",c:"var(--teal)",b:"var(--teal-light)"},"social":{l:"Social Media",e:"\uD83D\uDCF1",c:"var(--indigo)",b:"var(--indigo-light)"},"paid-ads":{l:"Paid Ads",e:"\uD83D\uDCB0",c:"var(--orange)",b:"var(--orange-light)"},"landing-page":{l:"Landing Pages",e:"\uD83C\uDFAF",c:"var(--rose)",b:"var(--rose-light)"},"video":{l:"Video Content",e:"\uD83C\uDFAC",c:"var(--amber)",b:"var(--amber-light)"},"podcast":{l:"Podcast Content",e:"\uD83C\uDF99\uFE0F",c:"var(--pink)",b:"var(--pink-light)"},"webinar":{l:"Webinar & Events",e:"\uD83D\uDCE1",c:"var(--cyan)",b:"var(--cyan-light)"},"case-study":{l:"Case Studies",e:"\uD83C\uDFC6",c:"var(--emerald)",b:"var(--emerald-light)"},"sales-enablement":{l:"Sales Enablement",e:"\uD83D\uDCBC",c:"var(--slate)",b:"var(--slate-light)"},"executive-summary":{l:"Executive Summaries",e:"\uD83D\uDCCA",c:"var(--green)",b:"var(--green-light)"}};
const PHASES=["all","strategy","content","distribution"];
const PL={all:"All Phases",strategy:"Strategy",content:"Content",distribution:"Distribution"};
const CAMPAIGNS=[
{id:"csrd-launch",name:"CSRD Platform Launch",color:"#2563eb"},
{id:"grc-launch",name:"AI-Powered GRC Launch",color:"#7c3aed"},
{id:"financial-reporting",name:"Financial Reporting Rebrand",color:"#0d9488"}
];

const DB=[
{id:"csrd-persona",cid:"csrd-launch",category:"strategy",content_type:"executive-summary",title:"Buyer Persona Research",description:"Map buyer personas for CSRD compliance: CFOs, sustainability leads, internal audit, IT teams.",prompt_template:"You are a B2B SaaS marketing strategist specializing in regulatory technology.\n\nConduct buyer persona research for a CSRD reporting platform.\n\nProduce:\n1. 4 buyer personas (CFO, Head of Sustainability, Internal Audit Director, IT/Data Lead) with role-specific pain points, motivations, objections\n2. Buying committee dynamics and budget authority\n3. Evaluation criteria and deal-breakers\n4. Content formats and channels each persona trusts\n5. Regulatory triggers that create urgency (transposition deadlines, audit cycles)",required_inputs:["company","product","audience","goal"],outputs:["buyer_personas","pain_points_by_role","trusted_channels"],dependencies:[],approval_required:false,eval_criteria:"4 personas with role-specific pain points. Buying committee mapped."},
{id:"csrd-competitive",cid:"csrd-launch",category:"strategy",content_type:"executive-summary",title:"Competitive Landscape",description:"Analyze Workiva, Sphera, Normative, IBM Envizi, Persefoni and identify gaps in CSRD tooling.",prompt_template:"Analyze the competitive landscape for CSRD reporting software.\n\nKey competitors: Workiva, Sphera, Ecovadis, Normative, IBM Envizi, Watershed, Persefoni.\n\nFor each:\n1. Core positioning\n2. CSRD/ESRS capabilities\n3. Pricing model and target size\n4. Strengths and weaknesses\n5. Differentiation gaps\n\nFocus on: double materiality automation, ERP connectors, assurance workflow gaps.",required_inputs:["company","product","buyer_personas"],outputs:["competitor_analysis","gap_analysis"],dependencies:["csrd-persona"],approval_required:false,eval_criteria:"7+ competitors. Clear gap analysis."},
{id:"csrd-positioning",cid:"csrd-launch",category:"strategy",content_type:"executive-summary",title:"Positioning & Messaging",description:"CSRD platform positioning, persona value props, and messaging hierarchy.",prompt_template:"Create the positioning and messaging framework for a CSRD ESG reporting platform.\n\nProduce:\n1. Positioning statement (For/Who/Is/Unlike/Because format)\n2. Value propositions mapped to each buyer persona\n3. 3 core messages ranked by priority\n4. Proof points: compliance stats, time savings, audit pass rates\n5. Messaging guidelines: approved terminology, tone rules\n6. Objection-handling language for sales",required_inputs:["company","product","buyer_personas","pain_points_by_role","gap_analysis","tone"],outputs:["positioning","value_props","key_messages","proof_points"],dependencies:["csrd-persona","csrd-competitive"],approval_required:true,eval_criteria:"Per-persona value props. No compliance guarantee language."},
{id:"csrd-whitepaper",cid:"csrd-launch",category:"content",content_type:"whitepaper",title:"CSRD Readiness Report",description:"Gated whitepaper: why most companies will fail their first ESRS audit and how to fix it.",prompt_template:"Write a whitepaper titled 'The CSRD Readiness Gap: Why Most Companies Will Fail Their First ESRS Audit'\n\nStructure:\n1. Executive summary (250 words)\n2. The CSRD landscape post-Omnibus: who is in scope (1,000+ employees, EUR 450M+), FY2027 timeline\n3. The readiness gap: most companies still use spreadsheets, lack Scope 3 data\n4. 5 common pitfalls\n5. Solution framework: automated data collection, materiality engine, ESRS builder, assurance exports\n6. Case study placeholder\n7. CTA\n\n2500-3000 words. Gated asset for lead generation.",required_inputs:["positioning","key_messages","tone"],outputs:["whitepaper_draft"],dependencies:["csrd-positioning"],approval_required:true,eval_criteria:"2500-3000 words. Regulatory accuracy."},
{id:"csrd-blog-omnibus",cid:"csrd-launch",category:"content",content_type:"blog",title:"Blog: CSRD After Omnibus",description:"What the Omnibus simplification means: new thresholds, timelines, practical next steps.",prompt_template:"Write a blog post: 'CSRD After Omnibus: What Actually Changed and What You Need to Do Now'\n\n1200-1500 words. Cover:\n- Omnibus threshold changes (1,000 employees, EUR 450M)\n- Shifted timelines (FY2027 first reporting)\n- Simplified ESRS standards\n- Practical next steps for in-scope companies\n\nSEO optimized. Include meta title and description. CTA to whitepaper download.",required_inputs:["positioning","tone"],outputs:["blog_omnibus"],dependencies:["csrd-positioning"],approval_required:false,eval_criteria:"1200-1500 words. Accurate Omnibus details."},
{id:"csrd-blog-materiality",cid:"csrd-launch",category:"content",content_type:"blog",title:"Blog: Double Materiality Guide",description:"Step-by-step guide to running a double materiality assessment for CSRD compliance.",prompt_template:"Write a blog post: 'Double Materiality Assessment: A Step-by-Step Guide for CSRD Compliance'\n\n1500-1800 words. Cover:\n- Definition of double materiality\n- Impact materiality vs financial materiality\n- ESRS requirements\n- Step-by-step assessment process\n- Common mistakes\n- How the platform automates this\n\nInclude diagram suggestions for the materiality matrix.",required_inputs:["positioning","tone"],outputs:["blog_materiality"],dependencies:["csrd-positioning"],approval_required:false,eval_criteria:"1500-1800 words. Technically accurate."},
{id:"csrd-blog-scope3",cid:"csrd-launch",category:"content",content_type:"blog",title:"Blog: Scope 3 Data Collection",description:"Practical guide on Scope 3 emissions data collection for ESRS E1.",prompt_template:"Write a blog post: 'Scope 3 Emissions Under ESRS E1: How to Collect What You Can't Control'\n\n1200-1500 words. Cover:\n- Why Scope 3 is required under ESRS E1\n- The 15 GHG Protocol categories\n- Data collection methods and estimation approaches\n- Supplier engagement strategies\n- How the platform automates collection",required_inputs:["positioning","tone"],outputs:["blog_scope3"],dependencies:["csrd-positioning"],approval_required:false,eval_criteria:"1200-1500 words. GHG Protocol aligned."},
{id:"csrd-email-nurture",cid:"csrd-launch",category:"content",content_type:"email",title:"Whitepaper Nurture Sequence",description:"6-email drip for whitepaper downloaders: educate, build trust, drive demo.",prompt_template:"Create a 6-email nurture sequence for prospects who download the CSRD Readiness Report.\n\nSequence:\n1. Welcome + whitepaper delivery (Day 0)\n2. The hidden cost of spreadsheet-based ESRS reporting (Day 3)\n3. How double materiality assessment actually works (Day 7)\n4. Customer story: how [Company] got audit-ready in 8 weeks (Day 12)\n5. CSRD deadline calculator + readiness checklist (Day 18)\n6. Personal demo invitation from sales (Day 25)\n\nEach email: subject line, preview text, body (under 250 words), CTA button text.",required_inputs:["positioning","value_props","tone"],outputs:["email_nurture"],dependencies:["csrd-positioning"],approval_required:true,eval_criteria:"6 emails, progressive arc, under 250 words each."},
{id:"csrd-linkedin",cid:"csrd-launch",category:"content",content_type:"social",title:"LinkedIn Thought Leadership",description:"12-post series: founder POV, regulatory insights, educational explainers, product angles.",prompt_template:"Create a 12-post LinkedIn series about CSRD compliance.\n\nContent mix:\n- 4 founder/CEO POV posts (industry trends, hot takes on Omnibus changes)\n- 3 data/insight posts (statistics, survey findings, benchmarks)\n- 3 educational posts (double materiality, ESRS E1, Scope 3)\n- 2 product-led posts (feature spotlight, customer quote)\n\nEach post: hook line, full copy (100-200 words), visual direction, hashtags, posting time.\nLinkedIn-native formatting. No external links in body.",required_inputs:["positioning","key_messages","tone"],outputs:["linkedin_series"],dependencies:["csrd-positioning"],approval_required:false,eval_criteria:"12 posts, correct mix."},
{id:"csrd-landing",cid:"csrd-launch",category:"content",content_type:"landing-page",title:"Platform Landing Page",description:"Conversion-optimized page with persona tabs, ERP integrations, FY2027 countdown.",prompt_template:"Write landing page copy for the CSRD reporting platform.\n\nSections:\n1. Hero: headline, subhead, dual CTA (Request Demo / Read Report), trust badges\n2. Problem: the CSRD compliance burden\n3. Platform: 4 capability pillars (Data Collection, Materiality Engine, Disclosure Builder, Assurance Workflow)\n4. Persona tabs: CFO view, Sustainability Lead view, Audit view\n5. Social proof: logos, quote, stats\n6. Integrations: SAP, Workday, Oracle, Salesforce\n7. FAQ (6 questions)\n8. Final CTA with FY2027 countdown urgency\n\nEach section: heading, body, CTA text, visual/layout notes.",required_inputs:["positioning","value_props","proof_points","tone"],outputs:["landing_page"],dependencies:["csrd-positioning"],approval_required:true,eval_criteria:"All sections. Persona-aware. FY2027 urgency."},
{id:"csrd-paid-linkedin",cid:"csrd-launch",category:"content",content_type:"paid-ads",title:"LinkedIn Sponsored Ads",description:"4 persona-targeted LinkedIn ad variants driving to whitepaper or demo.",prompt_template:"Create 4 LinkedIn Sponsored Content ads, one per buyer persona.\n\nPersonas: CFO, Sustainability Lead, Audit Director, IT Lead.\n\nEach ad: intro text, headline, description, CTA, targeting notes.\nInclude A/B test hypothesis per variant.\nCompliance note: avoid 'guaranteed compliance' language.",required_inputs:["positioning","buyer_personas"],outputs:["linkedin_ads"],dependencies:["csrd-positioning"],approval_required:false,eval_criteria:"4 persona-targeted variants."},
{id:"csrd-paid-google",cid:"csrd-launch",category:"content",content_type:"paid-ads",title:"Google Search Ads",description:"3 RSA ad groups for 'CSRD reporting software', 'double materiality tool', 'ESRS compliance'.",prompt_template:"Create 3 Google responsive search ad groups.\n\nKeyword themes:\n1. CSRD reporting software\n2. ESRS compliance platform\n3. Double materiality tool\n\nEach: 15 headlines, 4 descriptions, keyword list, negative keywords.",required_inputs:["positioning","landing_page"],outputs:["google_ads"],dependencies:["csrd-landing"],approval_required:false,eval_criteria:"3 ad groups, correct RSA format."},
{id:"csrd-video",cid:"csrd-launch",category:"content",content_type:"video",title:"Platform Explainer Video",description:"90-second animated script: data chaos to assured CSRD disclosure.",prompt_template:"Write a 90-second explainer video script.\n\nStructure:\n- Problem: data chaos, spreadsheet hell (15s)\n- Solution intro: the platform (10s)\n- 4-pillar walkthrough: Data Collection, Materiality, Disclosure, Assurance (40s)\n- Social proof: stat or quote (10s)\n- CTA: request demo (15s)\n\nInclude visual direction notes for each scene. Conversational, confident tone.",required_inputs:["positioning","key_messages","tone"],outputs:["video_script"],dependencies:["csrd-positioning"],approval_required:true,eval_criteria:"Under 90 seconds. Clear visual direction."},
{id:"csrd-podcast",cid:"csrd-launch",category:"content",content_type:"podcast",title:"'The Disclosure Desk' Episodes",description:"4 episode briefs covering CSRD readiness, data challenges, audit prep, CFO perspective.",prompt_template:"Create 4 episode briefs for 'The Disclosure Desk' podcast.\n\nEpisodes:\n1. 'The Omnibus Effect' - what changed, who is in scope\n2. 'Data Chaos' - why ESG data is harder than financial data\n3. 'Audit Ready or Audit Afraid' - preparing for limited assurance\n4. 'The CFO's Sustainability Headache' - bridging finance and ESG\n\nEach: title, guest profile suggestion, 5-6 talking points, key takeaway, CTA, 25-30 min format.",required_inputs:["positioning","buyer_personas","tone"],outputs:["podcast_briefs"],dependencies:["csrd-positioning"],approval_required:false,eval_criteria:"4 episodes, distinct angles, realistic guests."},
{id:"csrd-webinar",cid:"csrd-launch",category:"distribution",content_type:"webinar",title:"Launch Webinar Plan",description:"'CSRD After Omnibus: What Your Board Needs to Know Before FY2027'",prompt_template:"Plan a launch webinar.\n\nTitle: 'CSRD After Omnibus: What Your Board Needs to Know Before FY2027'\n\nProduce:\n1. 45-min outline + 15-min Q&A\n2. Speaker lineup: CEO + guest sustainability director + analyst\n3. Registration page copy\n4. 3 promotional emails\n5. Post-webinar follow-up sequence\n6. Promotion plan: LinkedIn, email, partner co-promo, paid\n7. Attendee-to-demo conversion path",required_inputs:["positioning","buyer_personas"],outputs:["webinar_plan"],dependencies:["csrd-positioning"],approval_required:true,eval_criteria:"Full outline. Promo across 3+ channels."},
{id:"csrd-case-study",cid:"csrd-launch",category:"content",content_type:"case-study",title:"Customer Case Study Template",description:"Structured template with 2 fictional EU enterprise examples.",prompt_template:"Create a case study template with 2 filled-in fictional examples.\n\nStructure:\n1. Headline formula: [Company] + [result] + [timeframe]\n2. Executive snapshot (challenge, solution, results)\n3. The challenge (CSRD trigger, pain points)\n4. The solution (implementation, features used, timeline)\n5. Results (quantified: time saved, audit readiness)\n6. Champion quote\n7. CTA\n\n2 examples: large EU manufacturer, mid-market financial services firm.",required_inputs:["positioning","proof_points","tone"],outputs:["case_study_template"],dependencies:["csrd-positioning"],approval_required:false,eval_criteria:"Clear template. 2 realistic examples."},
{id:"csrd-battlecard",cid:"csrd-launch",category:"content",content_type:"sales-enablement",title:"Sales Battlecards",description:"Competitive battlecards for top 5 CSRD competitors.",prompt_template:"Create sales battlecards vs top 5 competitors.\n\nFor each:\n1. Their pitch in 2 sentences\n2. Where they win\n3. Where we win\n4. Landmine questions to ask prospects\n5. Objection-handling scripts (3 per competitor)\n6. Proof point to close\n\nFormat for quick reference during sales calls.",required_inputs:["competitor_analysis","positioning","value_props"],outputs:["battlecards"],dependencies:["csrd-positioning"],approval_required:true,eval_criteria:"5 cards. Realistic questions."},
// --- GRC ---
{id:"grc-persona",cid:"grc-launch",category:"strategy",content_type:"executive-summary",title:"GRC Buyer Personas",description:"Map personas for AI-powered GRC: Chief Audit Executives, CROs, Compliance Officers, CISOs.",prompt_template:"Create 4 GRC buyer personas.\n\n1. Chief Audit Executive: pain around manual testing, fragmented tools, IIA standards adoption\n2. Chief Risk Officer: pain around siloed risk data, reactive posture\n3. Compliance Director: pain around SOX scramble, policy management\n4. CISO: pain around IT compliance, AI governance\n\nInclude buying dynamics, evaluation criteria, trusted channels.",required_inputs:["company","product","audience"],outputs:["grc_personas","grc_pain_points","grc_channels"],dependencies:[],approval_required:false,eval_criteria:"4 personas with GRC-specific pain points."},
{id:"grc-positioning",cid:"grc-launch",category:"strategy",content_type:"executive-summary",title:"GRC Positioning & Messaging",description:"Positioning for AI-powered GRC: from reactive compliance to proactive assurance.",prompt_template:"Create GRC positioning framework.\n\nCore narrative: 'From audit fatigue to intelligent assurance.'\n\nProduce:\n1. Positioning statement\n2. Value props per persona (CAE, CRO, Compliance, CISO)\n3. 3 key messages\n4. Proof points (IIA standards alignment, 80% automation stat, Forrester TEI)\n5. Messaging guidelines",required_inputs:["grc_personas","grc_pain_points","tone"],outputs:["grc_positioning","grc_value_props","grc_messages"],dependencies:["grc-persona"],approval_required:true,eval_criteria:"IIA standards referenced. AI capabilities central."},
{id:"grc-whitepaper",cid:"grc-launch",category:"content",content_type:"whitepaper",title:"AI in Internal Audit Report",description:"Whitepaper on how intelligent GRC replaces fragmented point solutions.",prompt_template:"Write a whitepaper: 'The AI Audit Revolution: How Intelligent GRC Is Replacing Point Solutions'\n\n2500 words. Cover:\n- The tool fragmentation problem (92% use 3+ tools for audit evidence)\n- AI-powered testing automation\n- Continuous controls monitoring\n- Risk intelligence and predictive analytics\n- Case study: enterprise SOX transformation\n- CTA to demo",required_inputs:["grc_positioning","grc_messages","tone"],outputs:["grc_whitepaper"],dependencies:["grc-positioning"],approval_required:true,eval_criteria:"2500+ words. Concrete AI use cases."},
{id:"grc-blog-standards",cid:"grc-launch",category:"content",content_type:"blog",title:"Blog: New IIA Standards Guide",description:"What the new IIA Global Internal Audit Standards mean for your team and tools.",prompt_template:"Blog: 'The New IIA Standards Are Here: What They Mean for Your Audit Tech Stack'\n\n1200-1500 words. Cover:\n- Overview of new IIA Global Internal Audit Standards\n- Key changes from previous standards\n- Implications for audit teams and technology\n- How an AI-powered GRC platform helps operationalize them\n- Practical checklist for compliance",required_inputs:["grc_positioning","tone"],outputs:["grc_blog_standards"],dependencies:["grc-positioning"],approval_required:false,eval_criteria:"1200-1500 words. IIA standards accurate."},
{id:"grc-blog-sox",cid:"grc-launch",category:"content",content_type:"blog",title:"Blog: SOX Compliance Automation",description:"How AI transforms SOX from annual scramble to continuous monitoring.",prompt_template:"Blog: 'SOX Compliance in 2026: Why the Annual Scramble Is Over'\n\n1200-1500 words. Cover:\n- SOX compliance challenges (manual testing, evidence gathering)\n- Continuous controls monitoring with AI\n- Automated testing and evidence requests\n- Real-time dashboards for control health\n- Before/after comparison of SOX workflow",required_inputs:["grc_positioning","tone"],outputs:["grc_blog_sox"],dependencies:["grc-positioning"],approval_required:false,eval_criteria:"1200-1500 words. Practical SOX guidance."},
{id:"grc-email-nurture",cid:"grc-launch",category:"content",content_type:"email",title:"GRC Nurture Sequence",description:"5-email sequence for GRC whitepaper downloaders targeting audit and risk leaders.",prompt_template:"Create a 5-email GRC nurture sequence.\n\nDay 0: Whitepaper delivery\nDay 3: The hidden cost of fragmented GRC tools\nDay 7: AI in internal audit: what's real vs hype (educational)\nDay 14: Customer story: SOX testing time cut 70%\nDay 21: Personal demo invitation\n\nEach: subject, preview text, body (under 250 words), CTA.",required_inputs:["grc_positioning","grc_value_props","tone"],outputs:["grc_email_nurture"],dependencies:["grc-positioning"],approval_required:true,eval_criteria:"5 emails. Under 250 words each."},
{id:"grc-linkedin",cid:"grc-launch",category:"content",content_type:"social",title:"GRC LinkedIn Series",description:"10-post series on AI in audit, risk intelligence, and modern GRC.",prompt_template:"Create 10 LinkedIn posts for AI-powered GRC.\n\nMix:\n- 3 CEO/thought leadership\n- 3 audit-specific (IIA standards, testing automation)\n- 2 risk/controls intelligence\n- 2 product-led (demo, customer quote)\n\nLinkedIn-native formatting. No external links in body.",required_inputs:["grc_positioning","grc_messages","tone"],outputs:["grc_linkedin"],dependencies:["grc-positioning"],approval_required:false,eval_criteria:"10 posts. LinkedIn-native."},
{id:"grc-landing",cid:"grc-launch",category:"content",content_type:"landing-page",title:"GRC Landing Page",description:"AI-powered GRC platform page with audit, risk, and compliance tabs.",prompt_template:"Write GRC landing page copy.\n\nSections:\n1. Hero: AI-powered GRC headline, stat callout\n2. Problem: tool fragmentation, audit fatigue\n3. 3 Solution Pillars: Audit Management, Controls Management, Risk Management\n4. AI Demo Section: show AI testing, risk discovery, policy drafting\n5. Social Proof: logos, customer quotes\n6. Integrations: SAP, Archer, Workday, ServiceNow\n7. FAQ (5 questions)\n8. CTA: request demo",required_inputs:["grc_positioning","grc_value_props","grc_pain_points","tone"],outputs:["grc_landing_page"],dependencies:["grc-positioning"],approval_required:true,eval_criteria:"All sections. AI capabilities prominent."},
{id:"grc-paid-ads",cid:"grc-launch",category:"content",content_type:"paid-ads",title:"GRC Paid Search & LinkedIn",description:"Google ads for GRC keywords + LinkedIn ads for audit/risk personas.",prompt_template:"Create paid media for GRC platform.\n\nGoogle: 3 RSA ad groups\n- Keywords: GRC software, internal audit platform, SOX compliance tool\n- Each: 15 headlines, 4 descriptions\n\nLinkedIn: 3 ads targeting CAE, CRO, Compliance Director\n- Each: intro text, headline, description, CTA",required_inputs:["grc_positioning","grc_personas","grc_landing_page"],outputs:["grc_ads"],dependencies:["grc-landing"],approval_required:false,eval_criteria:"3 Google + 3 LinkedIn."},
{id:"grc-video",cid:"grc-launch",category:"content",content_type:"video",title:"GRC Demo Video Script",description:"2-minute walkthrough: risk assessment to AI testing to executive dashboard.",prompt_template:"Write a 2-minute GRC demo video script.\n\nStructure:\n- Opening problem: fragmented tools, audit fatigue (20s)\n- Platform walkthrough: unified workspace (40s)\n- AI demo: automated testing, risk discovery (30s)\n- Executive dashboard: real-time visibility (20s)\n- CTA (10s)\n\nVisual direction per scene.",required_inputs:["grc_positioning","grc_messages","tone"],outputs:["grc_video_script"],dependencies:["grc-positioning"],approval_required:true,eval_criteria:"Under 2 minutes. Shows real workflow."},
{id:"grc-case-study",cid:"grc-launch",category:"content",content_type:"case-study",title:"GRC Customer Case Studies",description:"Template + 2 fictional examples: enterprise SOX transformation and mid-market risk consolidation.",prompt_template:"Create a GRC case study template with 2 examples.\n\n1. Fortune 500: SOX transformation, consolidated 5 tools, 70% testing time reduction\n2. Mid-market: unified risk view across 3 business units, first clean audit in 4 years\n\nEach: challenge, solution, quantified results, champion quote.",required_inputs:["grc_positioning","tone"],outputs:["grc_case_studies"],dependencies:["grc-positioning"],approval_required:false,eval_criteria:"2 realistic examples. Quantified results."},
{id:"grc-webinar",cid:"grc-launch",category:"distribution",content_type:"webinar",title:"GRC Launch Webinar",description:"'From Audit Fatigue to Intelligent Assurance' with IIA thought leaders.",prompt_template:"Plan webinar: 'From Audit Fatigue to Intelligent Assurance'\n\n45-min + Q&A. Speakers: CEO + guest Chief Audit Executive + Deloitte partner.\n\nProduce: outline, registration copy, 3 promo emails, post-webinar follow-up, promotion plan, conversion path.",required_inputs:["grc_positioning","grc_personas"],outputs:["grc_webinar_plan"],dependencies:["grc-positioning"],approval_required:true,eval_criteria:"Full outline. High-profile speakers."},

{id:"fr-persona",cid:"financial-reporting",category:"strategy",content_type:"executive-summary",title:"Financial Reporting Personas",description:"Personas for financial close and SEC reporting: Controllers, FP&A leads, SEC managers.",prompt_template:"Create 3 financial reporting personas.\n\n1. Corporate Controller: pain around manual close, reconciliation errors, audit prep\n2. VP of FP&A: pain around consolidation delays, version control, board reporting\n3. SEC Reporting Manager: pain around XBRL tagging, filing errors, time pressure\n\nBuying dynamics, evaluation criteria, trusted channels.",required_inputs:["company","product","audience"],outputs:["fr_personas","fr_pain_points","fr_channels"],dependencies:[],approval_required:false,eval_criteria:"3 personas with finance-specific pain points."},
{id:"fr-positioning",cid:"financial-reporting",category:"strategy",content_type:"executive-summary",title:"Financial Close Positioning",description:"Messaging for financial close automation and SEC reporting modernization.",prompt_template:"Create financial reporting positioning framework.\n\nCore narrative: 'Close faster. Report confidently. Sleep at quarter-end.'\n\nProduce:\n1. Positioning statement\n2. Value props per persona\n3. 3 key messages\n4. Proof points: Forrester TEI (208% ROI, 6-month payback, $2.93M savings)\n5. Messaging guidelines",required_inputs:["fr_personas","fr_pain_points","tone"],outputs:["fr_positioning","fr_value_props","fr_messages"],dependencies:["fr-persona"],approval_required:true,eval_criteria:"Forrester stats cited. Controller-focused."},
{id:"fr-blog-close",cid:"financial-reporting",category:"content",content_type:"blog",title:"Blog: The 5-Day Financial Close",description:"How AI and automation make the 5-day close achievable for mid-market companies.",prompt_template:"Blog: 'The 5-Day Financial Close Is No Longer a Dream'\n\n1200-1500 words. Cover:\n- Common close bottlenecks (manual reconciliation, email-based reviews)\n- Automation opportunities at each close step\n- AI-powered reconciliation and anomaly detection\n- Realistic timeline: from 15-day to 5-day close\n- CTA to demo",required_inputs:["fr_positioning","tone"],outputs:["fr_blog_close"],dependencies:["fr-positioning"],approval_required:false,eval_criteria:"1200-1500 words. Practical close timeline."},
{id:"fr-blog-xbrl",cid:"financial-reporting",category:"content",content_type:"blog",title:"Blog: XBRL Tagging Automation",description:"Why manual iXBRL/XBRL tagging is the hidden cost of SEC reporting.",prompt_template:"Blog: 'The Hidden Cost of Manual XBRL Tagging'\n\n1000-1200 words. Cover:\n- XBRL/iXBRL requirements for SEC filers\n- Error rates in manual tagging\n- Automation benefits: accuracy, speed, consistency\n- How the platform handles tagging natively\n- CTA to learn more",required_inputs:["fr_positioning","tone"],outputs:["fr_blog_xbrl"],dependencies:["fr-positioning"],approval_required:false,eval_criteria:"1000-1200 words. SEC accuracy focus."},
{id:"fr-email-nurture",cid:"financial-reporting",category:"content",content_type:"email",title:"Financial Close Email Series",description:"5-email sequence targeting controllers and FP&A around quarter-end pain.",prompt_template:"5 emails for finance leaders.\n\nDay 0: Guide delivery\nDay 3: The hidden costs of manual financial close\nDay 7: AI-powered reconciliation: what it actually does\nDay 14: Forrester TEI highlights (208% ROI, 6-month payback)\nDay 21: Demo invitation\n\nEach: subject, preview, body (under 250 words), CTA.",required_inputs:["fr_positioning","fr_value_props","tone"],outputs:["fr_email_nurture"],dependencies:["fr-positioning"],approval_required:true,eval_criteria:"5 emails. Quarter-end urgency."},
{id:"fr-linkedin",cid:"financial-reporting",category:"content",content_type:"social",title:"Financial Close LinkedIn Series",description:"8-post series on close modernization, AI in finance, reporting automation.",prompt_template:"8 LinkedIn posts for financial close platform.\n\nMix:\n- 2 CFO perspective posts\n- 2 controller tips and tricks\n- 2 automation how-to posts\n- 2 product-led (Forrester stat, feature)\n\nLinkedIn-native. No external links.",required_inputs:["fr_positioning","fr_messages","tone"],outputs:["fr_linkedin"],dependencies:["fr-positioning"],approval_required:false,eval_criteria:"8 posts. Finance audience."},
{id:"fr-landing",cid:"financial-reporting",category:"content",content_type:"landing-page",title:"Financial Close Landing Page",description:"Landing page with Forrester TEI stats and SEC compliance focus.",prompt_template:"Write financial close landing page.\n\nSections:\n1. Hero: Forrester 208% ROI stat callout\n2. Problem: close bottlenecks, manual reconciliation\n3. Platform: close automation, XBRL, multi-entity consolidation\n4. Forrester TEI Section: 208% ROI, 6-month payback, $2.93M savings\n5. Social proof: logos, customer quotes\n6. Integrations: SAP, Oracle, NetSuite, Workday\n7. FAQ (5 questions)\n8. CTA: request demo",required_inputs:["fr_positioning","fr_value_props","fr_pain_points","tone"],outputs:["fr_landing_page"],dependencies:["fr-positioning"],approval_required:true,eval_criteria:"Forrester stats prominent. SEC focus."},
{id:"fr-paid-ads",cid:"financial-reporting",category:"content",content_type:"paid-ads",title:"Financial Close Paid Ads",description:"Google ads for finance keywords + LinkedIn ads for controllers.",prompt_template:"Paid media for financial close platform.\n\nGoogle: 3 ad groups\n- Financial close software\n- SEC reporting platform\n- XBRL automation tool\n\nLinkedIn: 3 ads for Controller, FP&A, SEC Reporting personas.\nEach: full RSA format / ad copy.",required_inputs:["fr_positioning","fr_personas","fr_landing_page"],outputs:["fr_ads"],dependencies:["fr-landing"],approval_required:false,eval_criteria:"3 Google + 3 LinkedIn."},
{id:"fr-video",cid:"financial-reporting",category:"content",content_type:"video",title:"Financial Close Explainer Video",description:"60-second before/after showing close process transformation.",prompt_template:"60-second before/after video script.\n\nBefore: chaos, spreadsheets, 15-day close, midnight reconciliation (20s)\nAfter: automated workflows, 5-day close, real-time dashboards (25s)\nPlatform demo highlight (10s)\nCTA with Forrester stat (5s)\n\nVisual direction per scene.",required_inputs:["fr_positioning","fr_messages","tone"],outputs:["fr_video"],dependencies:["fr-positioning"],approval_required:true,eval_criteria:"Under 60 seconds. Clear before/after."},
{id:"fr-case-study",cid:"financial-reporting",category:"content",content_type:"case-study",title:"Financial Close Case Study",description:"Template + fictional example: company cutting close from 15 to 5 days.",prompt_template:"Case study: [Company] cut financial close from 15 to 5 days.\n\nChallenge: multi-entity, manual reconciliation, 3 weeks of overtime per quarter\nSolution: platform implementation, automated reconciliation, real-time consolidation\nResults: 67% close time reduction, $400K annual savings, zero restatements\nQuote from Controller.",required_inputs:["fr_positioning","tone"],outputs:["fr_case_study"],dependencies:["fr-positioning"],approval_required:false,eval_criteria:"Quantified results. Realistic scenario."},
{id:"fr-podcast",cid:"financial-reporting",category:"content",content_type:"podcast",title:"CFO Podcast Episodes",description:"3 episodes for 'The Close' podcast: AI in finance, multi-entity, modern controller.",prompt_template:"3 podcast episodes for 'The Close'.\n\n1. 'AI Won't Replace Your Controller' - how AI augments finance teams\n2. 'The Multi-Entity Nightmare' - consolidation challenges at scale\n3. 'The Modern Controller' - evolving role from bookkeeper to strategic advisor\n\nEach: guest profile, 5-6 talking points, key takeaway, 25 min format.",required_inputs:["fr_positioning","fr_personas","tone"],outputs:["fr_podcast"],dependencies:["fr-positioning"],approval_required:false,eval_criteria:"3 episodes. Finance-focused guests."},
{id:"fr-webinar",cid:"financial-reporting",category:"distribution",content_type:"webinar",title:"Quarterly Close Webinar",description:"'Close Faster, Report Confidently' with Forrester TEI findings and live demo.",prompt_template:"Plan webinar: 'Close Faster, Report Confidently: Lessons from the Forrester TEI Study'\n\n45-min. Speakers: CFO + Forrester analyst + live product demo.\n\nProduce: outline, registration copy, 3 promo emails, post-webinar follow-up, promotion plan, conversion path.",required_inputs:["fr_positioning","fr_personas"],outputs:["fr_webinar_plan"],dependencies:["fr-positioning"],approval_required:true,eval_criteria:"Forrester analyst as speaker. Live demo."}
];

let S={sel:null,view:"cards",typeFilter:"all",phaseFilter:"all",campaignFilter:"all",search:""};
function getFiltered(){let n=DB.slice();if(S.campaignFilter!=='all')n=n.filter(p=>p.cid===S.campaignFilter);if(S.typeFilter!=='all')n=n.filter(p=>p.content_type===S.typeFilter);if(S.phaseFilter!=='all')n=n.filter(p=>p.category===S.phaseFilter);if(S.search){const q=S.search.toLowerCase();n=n.filter(p=>p.title.toLowerCase().includes(q)||p.description.toLowerCase().includes(q)||p.id.toLowerCase().includes(q))}return n}
function allTypes(){return[...new Set(DB.map(p=>p.content_type))]}
function getCampaign(cid){return CAMPAIGNS.find(c=>c.id===cid)||{name:'?',color:'#888'}}

function buildCampaignSelector(){const el=document.getElementById('campaign-selector');const base=S.search?DB.filter(p=>{const q=S.search.toLowerCase();return p.title.toLowerCase().includes(q)||p.description.toLowerCase().includes(q)}):DB;let h=`<div class="campaign-chip ${S.campaignFilter==='all'?'active':''}" onclick="setCampaign('all')"><div class="cdot" style="background:var(--text-light)"></div>All Campaigns<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">${base.length}</span></div>`;CAMPAIGNS.forEach(c=>{const cnt=base.filter(p=>p.cid===c.id).length;h+=`<div class="campaign-chip ${S.campaignFilter===c.id?'active':''}" onclick="setCampaign('${c.id}')"><div class="cdot" style="background:${c.color}"></div>${c.name}<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">${cnt}</span></div>`});el.innerHTML=h}

function buildSidebar(){const el=document.getElementById('sidebar-types');const nodes=getFiltered();const pool=S.campaignFilter==='all'?DB:DB.filter(p=>p.cid===S.campaignFilter);let h=`<div class="nav-item ${S.typeFilter==='all'?'active':''}" onclick="filterType('all')"><div class="nav-icon">\u25CE</div><div class="nav-label">All Types</div><div class="nav-count">${pool.length}</div></div>`;allTypes().forEach(t=>{const ct=CT[t]||{l:t,e:"\uD83D\uDCC4"};const count=pool.filter(p=>p.content_type===t).length;if(!count)return;h+=`<div class="nav-item ${S.typeFilter===t?'active':''}" onclick="filterType('${t}')"><div class="nav-emoji">${ct.e}</div><div class="nav-label">${ct.l}</div><div class="nav-count">${count}</div></div>`});el.innerHTML=h}

function buildPhaseBar(){const el=document.getElementById('phase-bar');if(S.view==='log'){el.innerHTML='';return}el.innerHTML='<div class="phase-filter-bar">'+PHASES.map(ph=>`<div class="phase-chip ${S.phaseFilter===ph?'active':''}" onclick="setPhase('${ph}')">${PL[ph]}</div>`).join('')+'</div>'}

function renderCards(){const el=document.getElementById('v-cards');const nodes=getFiltered();const groups={};nodes.forEach(n=>{if(!groups[n.content_type])groups[n.content_type]=[];groups[n.content_type].push(n)});let h='';allTypes().forEach(type=>{if(!groups[type])return;const ct=CT[type]||{l:type,e:"\uD83D\uDCC4",c:"var(--text-muted)",b:"var(--bg)"};h+=`<div class="type-group"><div class="type-header"><div class="type-icon" style="background:${ct.b};color:${ct.c}">${ct.e}</div><div class="type-title">${ct.l}</div><div class="type-count">${groups[type].length}</div><div class="type-line"></div></div><div class="node-grid">`;groups[type].forEach(n=>{const camp=getCampaign(n.cid);h+=`<div class="node-card ${S.sel===n.id?'selected':''}" onclick="selectNode('${n.id}')"><div class="node-top"><div class="node-title">${n.title}</div></div><div class="node-meta"><span class="node-campaign-dot" style="background:${camp.color}"></span><span class="node-campaign-label">${camp.name}</span><span class="node-phase-badge">${n.category}</span></div><div class="node-desc">${n.description}</div>${n.approval_required?'<div class="node-gate">\uD83D\uDD12</div>':''}${n.dependencies.length?`<div class="node-deps">${n.dependencies.map(d=>`<span class="dep-pill">\u2190 ${DB.find(p=>p.id===d)?.title||d}</span>`).join('')}</div>`:''}</div>`});h+=`</div></div>`});if(!h)h=`<div class="empty-state"><div class="empty-icon">\uD83D\uDD0D</div><div class="empty-text">No prompts match your current filters.</div></div>`;el.innerHTML=h}

function renderTable(){const el=document.getElementById('v-table');const nodes=getFiltered();let r=nodes.map(p=>{const ct=CT[p.content_type]||{l:p.content_type,c:"var(--text-muted)",b:"var(--bg)"};const camp=getCampaign(p.cid);return`<tr class="${S.sel===p.id?'selected':''}" onclick="selectNode('${p.id}')"><td><span class="id-cell">${p.id}</span></td><td><span class="cat-badge" style="background:${ct.b};color:${ct.c}">${ct.l}</span></td><td style="font-weight:500">${p.title}</td><td><span style="display:inline-flex;align-items:center;gap:4px"><span class="node-campaign-dot" style="background:${camp.color}"></span><span style="font-size:11px;color:var(--text-muted)">${camp.name}</span></span></td><td style="color:var(--text-muted);font-size:11px">${p.category}</td><td>${p.approval_required?'\uD83D\uDD12':'\u2014'}</td></tr>`}).join('');el.innerHTML=`<div class="db-table-wrapper"><table class="db-table"><thead><tr><th>ID</th><th>Content Type</th><th>Name</th><th>Campaign</th><th>Phase</th><th>Gate</th></tr></thead><tbody>${r}</tbody></table></div>`}

function renderDetail(id){const p=DB.find(x=>x.id===id);if(!p)return;const ct=CT[p.content_type]||{l:p.content_type,e:"",c:"var(--text-muted)",b:"var(--bg)"};const camp=getCampaign(p.cid);document.getElementById('ptitle').textContent='Prompt Details';document.getElementById('copy-btn').style.display='inline-flex';let h=`<div class="panel-body"><div class="detail-block"><div class="node-name-display">${p.title}</div><div style="display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap"><span class="cat-badge" style="background:${ct.b};color:${ct.c};font-size:9px">${ct.e} ${ct.l}</span><span class="node-phase-badge">${p.category}</span><span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--text-muted)"><span class="node-campaign-dot" style="background:${camp.color}"></span>${camp.name}</span>${p.approval_required?'<span style="font-size:10px;color:var(--purple)">\uD83D\uDD12 Review gate</span>':''}</div><div class="detail-text">${p.description}</div></div>`;h+=`<div class="detail-block"><div class="detail-heading">Inputs Needed</div><div class="tag-group">${p.required_inputs.map(i=>`<span class="tag">${i.replace(/_/g,' ')}</span>`).join('')}</div></div>`;h+=`<div class="detail-block"><div class="detail-heading">Produces</div><div class="tag-group">${p.outputs.map(o=>`<span class="tag tag-accent">${o.replace(/_/g,' ')}</span>`).join('')}</div></div>`;h+=`<div class="detail-block"><div class="detail-heading">Depends On</div><div class="detail-text">${p.dependencies.length?p.dependencies.map(d=>`<span class="dep-pill" style="cursor:pointer" onclick="selectNode('${d}')">${DB.find(x=>x.id===d)?.title||d}</span>`).join(' '):'None \u2014 standalone prompt'}</div></div>`;h+=`<div class="detail-block"><div class="detail-heading">Quality Check</div><div class="detail-text" style="font-size:12px">${p.eval_criteria}</div></div>`;h+=`<div class="detail-block"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div class="detail-heading" style="margin-bottom:0">Prompt Template</div><button class="copy-btn" onclick="copyTemplate()">Copy Template</button></div><div class="detail-mono" id="prompt-text">${esc(p.prompt_template)}</div></div></div>`;document.getElementById('panel-content').innerHTML=h}

function updateCount(){const nodes=getFiltered();document.getElementById('prompt-count').textContent=nodes.length+' prompt'+(nodes.length!==1?'s':'')}

function selectNode(id){S.sel=id;renderDetail(id);R()}
function switchView(v,tab){S.view=v;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.getElementById('v-cards').style.display=v==='cards'?'block':'none';document.getElementById('v-table').style.display=v==='table'?'block':'none';R()}
function R(){buildCampaignSelector();buildSidebar();buildPhaseBar();if(S.view==='cards')renderCards();else renderTable();updateCount()}
function filterType(t){S.typeFilter=t;R()}
function filterStatus(s){S.sf=S.sf===s?null:s;R()}
function setPhase(ph){S.phaseFilter=ph;R()}
function setCampaign(c){S.campaignFilter=c;S.typeFilter='all';R()}
function onSearch(v){S.search=v;R()}
function openModal(){document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

function copyTemplate(){const p=DB.find(x=>x.id===S.sel);if(!p)return;navigator.clipboard.writeText(p.prompt_template).then(()=>{const btns=document.querySelectorAll('.copy-btn');btns.forEach(b=>{if(b.textContent==='Copy Template'){b.textContent='Copied!';b.classList.add('copied');setTimeout(()=>{b.textContent='Copy Template';b.classList.remove('copied')},1500)}})}).catch(()=>{})}
function copyPrompt(){copyTemplate()}

R();
</script>
</body>
</html>
